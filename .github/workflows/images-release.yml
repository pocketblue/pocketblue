name: images release
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      fedora_branch:
        type: choice
        description: fedora branch
        required: true
        options:
          - '43'
          - '44'
          - 'rawhide'
        default: '44'

jobs:
  create_release:
    runs-on: ubuntu-24.04-arm
    name: create release
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: version
        id: version
        run: |
          export full_version=$(skopeo inspect docker://quay.io/pocketblue/qualcomm-sdm845-phosh:${{ inputs.fedora_branch }} --format '{{ index .Labels "org.opencontainers.image.version" }}')
          echo version=$(echo $full_version | cut -d. -f1-2) >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v3
        id: create_release
        with:
          tag_name: ${{ steps.version.outputs.version }}
          draft: true
          body: |
            > [!IMPORTANT]
            > Xiaomi Pad 5 images with UFS patches have been renamed from `44-samsung` to `44-rodriguezst`. You should rebase to the new tag:
            > With bootc:
            > ```bash
            > sudo bootc switch --enforce-container-sigpolicy quay.io/pocketblue/xiaomi-nabu-<DESKTOP>:44-rodriguezst
            > ```
            > With rpm-ostree:
            > ```bash
            > sudo rpm-ostree rebase ostree-image-signed:docker://quay.io/pocketblue/xiaomi-nabu-<DESKTOP>:44-rodriguezst
            > ```

            > [!IMPORTANT]
            > We are switching our Xiaomi Pad 6 (pipa) images from kxboot to Silicium.
            > If you have already installed Pocketblue with kxboot, follow this guide to switch to Silicium manually to avoid possible problems with future updates: https://github.com/pocketblue/pocketblue/issues/223

            Recommended images:
            - Xiaomi Pad 5 (xiaomi-nabu): [xiaomi-nabu-gnome-desktop](https://github.com/pocketblue/pocketblue/releases/download/${{ steps.version.outputs.version }}/pocketblue-xiaomi-nabu-gnome-desktop-${{ inputs.fedora_branch }}.7z)
            - Xiaomi Pad 5, **Outdated kernel with Samsung UFS patches** (xiaomi-nabu-rodriguezst): [xiaomi-nabu-gnome-desktop](https://github.com/pocketblue/pocketblue/releases/download/${{ steps.version.outputs.version }}/pocketblue-xiaomi-nabu-gnome-desktop-${{ inputs.fedora_branch }}-rodriguezst.7z)
            - Xiaomi Pad 6 (xiaomi-pipa): [xiaomi-pipa-gnome-desktop](https://github.com/pocketblue/pocketblue/releases/download/${{ steps.version.outputs.version }}/pocketblue-xiaomi-pipa-gnome-desktop-${{ inputs.fedora_branch }}.7z)
            - OnePlus 6/6T (oneplus-enchilada/fajita): [qualcomm-sdm845-phosh](https://github.com/pocketblue/pocketblue/releases/download/${{ steps.version.outputs.version }}/pocketblue-qualcomm-sdm845-phosh-${{ inputs.fedora_branch }}.7z)
            - Xiaomi Poco F1 (xiaomi-beryllium): [qualcomm-sdm845-phosh](https://github.com/pocketblue/pocketblue/releases/download/${{ steps.version.outputs.version }}/pocketblue-qualcomm-sdm845-phosh-${{ inputs.fedora_branch }}.7z)
            - Orange Pi 3 LTS (xunlong-orangepi3-lts): [xunlong-orangepi3-lts-tty](https://github.com/pocketblue/pocketblue/releases/download/${{ steps.version.outputs.version }}/pocketblue-xunlong-orangepi3-lts-tty-${{ inputs.fedora_branch }}.7z)

            Changelog:
            - All container images are now signed with cosign
            - The tag of xiaomi-nabu images with rodriguezst kernel has been renamed to `<version>-rodriguezst`
            - Disk images can now be built locally
            - `rodriguezst` variant of Xiaomi Pad 5 images no longer requires custom partitioning
            - Xiaomi Pad 6 images now use Silicium UEFI and GRUB instead of kxboot
            - `sm8250` kernel for xiaomi-pipa upgraged to 6.18.2
            - `bluez` package is no longer downgraded
            - Default applications are now installed with Flatpak's preinstall.d
            - Firefox RPM package removed from `-tty` images

  images_build:
    needs: create_release
    strategy:
      matrix:
        device:
          - qualcomm-sdm845
          - xiaomi-nabu
          - xiaomi-nabu-rodriguezst
          - xiaomi-pipa
          - xunlong-orangepi3-lts
        desktop: [tty, gnome-desktop, plasma-desktop, plasma-mobile, phosh]
    name: ${{ matrix.device }}-${{ matrix.desktop }}:${{ inputs.fedora_branch }}
    uses: ./.github/workflows/images.yml
    with:
      device: ${{ matrix.device }}
      desktop: ${{ matrix.desktop }}
      tag: ${{ inputs.fedora_branch }}
      release_id: ${{ needs.create_release.outputs.release_id }}
