name: images
run-name: >
  images: ${{ inputs.device }}
  / fedora ${{ inputs.tag }}
  ${{ inputs.desktop && inputs.desktop != 'all' && format(' / {0}', inputs.desktop) || '' }}
on:
  workflow_dispatch:
    inputs:
      device:
        type: choice
        description: 'device name'
        required: true
        options:
          - nothing-spacewar
          - qualcomm-sdm845
          - xiaomi-nabu
          - xiaomi-nabu-rodriguezst
          - xiaomi-pipa
          - xunlong-orangepi3-lts
      tag:
        type: string
        description: image tag
        required: true
        default: '43'
      desktop:
        type: choice
        description: desktop
        required: true
        options:
          - all
          - tty
          - gnome-desktop
          - gnome-mobile
          - plasma-desktop
          - plasma-mobile
          - phosh
        default: all
jobs:
  desktops:
    runs-on: ubuntu-24.04-arm
    outputs:
      desktops: ${{ steps.desktops.outputs.desktops }}
    steps:
      - id: desktops
        uses: pocketblue/actions/select-desktops@main
        with:
          desktop: ${{ inputs.desktop || '' }}
          desktop_list: |
            tty
            gnome-desktop
            gnome-mobile
            plasma-desktop
            plasma-mobile
            phosh

  images:
    needs: desktops
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        desktop: ${{ fromJson(needs.desktops.outputs.desktops) }}
    name: ${{ inputs.device }}-${{ matrix.desktop }}:${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Get device config
        id: conf
        shell: bash
        run: |
          cat 'devices/${{ inputs.device }}/build-aux/device.conf' >> $GITHUB_OUTPUT

      - name: Prepare environment
        env:
          IMAGE_REGISTRY: ${{ vars.REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
        run: |
          if [ -z "${{ steps.conf.outputs.device_variant }}" ]; then
            echo "PB_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
          else
            echo "PB_TAG=${{ inputs.tag }}-${{ steps.conf.outputs.device_variant }}" >> $GITHUB_ENV
          fi

          cat >> ${GITHUB_ENV} << EOF
          PB_DEVICE=${{ inputs.device }}
          PB_DESKTOP=${{ inputs.desktop }}
          PB_REGISTRY=${IMAGE_REGISTRY,,}
          EOF

      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'

      - name: Pull the container image
        run: |
          if [ -z "${{ steps.conf.outputs.device_base }}" ]; then
            # not a variant, nothing to retag
            sudo podman pull "${{ env.PB_REGISTRY }}/${{ env.PB_DEVICE }}-${{ env.PB_DESKTOP }}:${{ env.PB_TAG }}"
          else
            # a variant, pull from the base device repo and retag
            sudo podman pull "${{ env.PB_REGISTRY }}/${{ steps.conf.outputs.device_base }}-${{ env.PB_DESKTOP }}:${{ env.PB_TAG }}"
            sudo podman tag \
              "${{ env.PB_REGISTRY }}/${{ steps.conf.outputs.device_base }}-${{ env.PB_DESKTOP }}:${{ env.PB_TAG }}" \
              "${{ env.PB_REGISTRY }}/${{ env.PB_DEVICE }}-${{ env.PB_DESKTOP }}:${{ env.PB_TAG }}"
          fi

      - name: Build disk image
        run: |
          just disk

      - name: Post-process images
        run: |
          just postprocess
          if [ -d images ]; then
            sudo chown "$(id -u):$(id -g)" -R images
          fi
          if [ -f disk.raw ]; then
            sudo chown "$(id -u):$(id -g)" disk.raw
          fi

      - name: Collect artifacts
        run: |
          just artifacts

      - name: Upload images archive
        uses: actions/upload-artifact@v7
        with:
          name: pocketblue-${{ inputs.device }}-${{ matrix.desktop }}-${{ inputs.tag }}
          path: pocketblue-${{ inputs.device }}-${{ matrix.desktop }}-${{ inputs.tag }}.7z
          archive: false

      - name: Upload erofs image
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: rootfs-${{ inputs.device }}-${{ matrix.desktop }}-${{ inputs.tag }}
          path: rootfs-${{ inputs.device }}-${{ matrix.desktop }}-${{ inputs.tag }}.ero
          archive: false
