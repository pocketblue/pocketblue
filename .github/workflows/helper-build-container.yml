on:
  workflow_call:
    inputs:
      # container's base image
      fedora_branch:
        required: true
        type: string

      # image to build
      registry:
        required: true
        type: string
      device:
        required: true
        type: string
      desktop:
        required: true
        type: string
      tag:
        required: true
        type: string

      # misc parameters
      latest:
        required: false
        type: string
        default: ''
      expires:
        required: false
        type: string
        default: ''

jobs:
  build:
    name: ${{ inputs.device }}-${{ inputs.desktop }}
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Get device config
        id: conf
        shell: bash
        run: |
          cat 'devices/${{ inputs.device }}/build-aux/device.conf' >> $GITHUB_OUTPUT

      - name: Prepare environment
        env:
          INPUT_REGISTRY: ${{ inputs.registry }}
          REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME || github.repository_owner }}
        run: |
          echo "REGISTRY_USERNAME=${REGISTRY_USERNAME,,}" >> ${GITHUB_ENV}

          if [ -z "${{ steps.conf.outputs.device_variant }}" ]; then
            echo "PB_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
            echo "TARGET_IMAGE_NAME=${{ inputs.device }}-${{ inputs.desktop }}" >> $GITHUB_ENV
          else
            echo "PB_TAG=${{ inputs.tag }}-${{ steps.conf.outputs.device_variant }}" >> $GITHUB_ENV
            echo "TARGET_IMAGE_NAME=${{ steps.conf.outputs.device_base }}-${{ inputs.desktop }}" >> $GITHUB_ENV
          fi

          cat >> ${GITHUB_ENV} << EOF
          PB_BRANCH=${{ inputs.fedora_branch }}
          PB_DEVICE=${{ inputs.device }}
          PB_DESKTOP=${{ inputs.desktop }}
          PB_REGISTRY=${INPUT_REGISTRY,,}
          PB_EXPIRES_AFTER=${{ inputs.expires && '1w' || '' }}
          PB_RECHUNK_SUFFIX=-build
          EOF

      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'

      - name: Pull
        id: pull
        run: |
          just pull

      - name: Build
        id: build
        run: just build

      - name: Rechunk
        id: rechunk
        run: |
          just rechunk

      - name: Retag
        id: retag
        if: steps.conf.outputs.device_base
        shell: bash
        run: |
          sudo podman tag \
            ${{ env.PB_REGISTRY }}/${{ env.PB_DEVICE }}-${{ env.PB_DESKTOP }}:${{ env.PB_TAG }} \
            ${{ env.PB_REGISTRY }}/${{ env.TARGET_IMAGE_NAME }}:${{ env.PB_TAG }}

      - name: Push
        id: push
        uses: pocketblue/actions/container-push@main
        env:
          latest: ${{ inputs.latest }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}
          registry: ${{ env.PB_REGISTRY }}
          name: ${{ env.TARGET_IMAGE_NAME }}
          tag: ${{ env.PB_TAG }}
