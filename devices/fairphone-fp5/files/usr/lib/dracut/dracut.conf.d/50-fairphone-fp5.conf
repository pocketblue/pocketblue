# Fairphone 5 (QCM6490/SC7280/Kodiak) dracut configuration

# IPC / messaging (needed for PMIC, battery, USB-C communication)
add_drivers+=" rpmsg_core qcom_glink_rpm qcom_glink_smem "
add_drivers+=" qcom_smd rpmsg_char rpmsg_ctrl "
add_drivers+=" qrtr qrtr_smd pmic_glink qmi_helpers "

# Storage
add_drivers+=" ufshcd_core ufshcd_pltfrm ufs_qcom "

# MMC/SD storage
add_drivers+=" mmc_core mmc_block sdhci sdhci_pltfm sdhci_msm cqhci "

# TEE (needed for firmware loading)
add_drivers+=" tee optee "

# USB
add_drivers+=" dwc3 dwc3_qcom typec ucsi_glink fsa4480 "

# Input (touchscreen + haptic)
add_drivers+=" goodix_berlin_spi goodix_berlin_core aw86927 "

# Display / DRM (framebuffer console during initramfs)
add_drivers+=" msm panel_raydium_rm692e5 panel_visionox_rm692e5 gpu_sched "

# Remoteproc / DSP (modem, audio, sensors)
add_drivers+=" qcom_q6v5_pas qcom_sysmon qcom_pd_mapper "
add_drivers+=" fastrpc "

# Audio (LPASS / SoundWire / codec)
add_drivers+=" snd_soc_sc7280 "
add_drivers+=" snd_soc_lpass_cpu snd_soc_lpass_platform "
add_drivers+=" snd_soc_lpass_rx_macro snd_soc_lpass_tx_macro "
add_drivers+=" snd_soc_lpass_va_macro snd_soc_lpass_wsa_macro "
add_drivers+=" soundwire_qcom snd_soc_wcd938x_sdw snd_soc_wsa883x "

# Modem (QCM6490 uses IPA for data, QRTR/QMI for control)
add_drivers+=" ipa "

# Firmware for initramfs (remoteproc DSP firmware + GPU)
install_optional_items+=" /usr/lib/firmware/qcom/qcm6490/fairphone5/* "
install_optional_items+=" /usr/lib/firmware/qcom/qcm6490/fairphone5/modem_pr/* "
install_optional_items+=" /usr/lib/firmware/qcom/a660_sqe.fw.xz /usr/lib/firmware/qcom/a660_gmu.bin.xz "

# Bluetooth firmware - WCN6750 (QCA)
install_items+=" /usr/lib/firmware/qca/msbtfw11.mbn.xz "
install_items+=" /usr/lib/firmware/qca/msnv11.bin.xz "
install_optional_items+=" /usr/lib/firmware/qca/msbtfw11.tlv.xz "

# NSS files for user/group resolution in initramfs (needed by systemd/ostree)
install_items+=" /etc/passwd /etc/group /etc/shadow /etc/nsswitch.conf "
install_items+=" /usr/lib64/libnss_files.so.2 /lib64/libnss_files.so.2 "
install_optional_items+=" /usr/lib64/libnss_compat.so.2 /lib64/libnss_compat.so.2 "

# SPI/I2C bus drivers
install_optional_items+=" /usr/lib/modules/*/kernel/drivers/spi/spi-geni-qcom.ko* "
install_optional_items+=" /usr/lib/modules/*/kernel/drivers/i2c/busses/i2c-qcom-geni.ko* "

# Filesystems
filesystems+=" ext4 f2fs btrfs xfs "

# Dracut modules
add_dracutmodules+=" systemd systemd-initrd base rootfs-block dm ostree "

compress="zstd"
dracut_rescue_image="no"
hostonly="no"
hostonly_cmdline="no"
