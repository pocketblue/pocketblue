# rpmsg_wwan_ctrl creates non-functional AT ports on QCM6490 that cause
# ModemManager to hang during probe and block systemd shutdown.
# QCM6490 uses QRTR/QMI for modem control instead.
blacklist rpmsg_wwan_ctrl

# snd_soc_lpass_cpu and snd_soc_sc7280 conflict with the Q6AFE/ADSP audio
# path used by the FP5. The LPASS CPU driver claims MI2S hardware resources,
# preventing the ADSP from generating I2S clocks. The SC7280 machine driver
# matches the FP5 sound card compatible but doesn't handle it correctly;
# snd_soc_sm8250 (the generic Qualcomm machine driver) should be used instead.
blacklist snd_soc_lpass_cpu
blacklist snd_soc_lpass_platform
blacklist snd_soc_sc7280
